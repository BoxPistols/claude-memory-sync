name: CI

# 安全性メモ:
# 本ワークフローは github.event.* を一切参照しない。全ての動的値は
# matrix / env / 公式環境変数 ($GITHUB_WORKSPACE) のみから取得する。
# untrusted input による command injection のリスクはない。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck install.sh hooks/*.sh bin/cm

  node-syntax:
    name: node syntax check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: node --check bin scripts
        run: |
          node --check bin/setup.js
          node --check bin/uninstall.js
      - name: verify ESM works via package.json type=module
        run: node -e "console.log('node', process.version, 'ESM OK')"

  scan-secrets-smoke:
    name: scan-secrets smoke test
    runs-on: ubuntu-latest
    env:
      CLAUDE_MEMORY_DIR: /tmp/test-mem
    steps:
      - uses: actions/checkout@v4
      - name: Set up test memory repo
        run: |
          mkdir -p "$CLAUDE_MEMORY_DIR"
          cd "$CLAUDE_MEMORY_DIR"
          git init -q -b main
          git config user.email test@example.com
          git config user.name Tester
          echo 'safe content' > global.md
          # 初期状態を commit しておく — 各テストは使い終わったら
          # git checkout で clean 状態に戻せる
          git add global.md
          git commit -q -m "initial test fixture"
      - name: clean changes should pass (exit 0)
        run: bash hooks/scan-secrets.sh
      - name: OpenAI-style key should fail (exit 1)
        run: |
          echo 'leaked: sk-proj-abcdef1234567890abcdef1234567890' >> "$CLAUDE_MEMORY_DIR/global.md"
          if bash hooks/scan-secrets.sh; then
            echo "FAIL: scanner did not detect leaked key"
            exit 1
          fi
          # 次のテストのために clean 状態に戻す
          git -C "$CLAUDE_MEMORY_DIR" checkout -- global.md
      - name: PEM private key should fail (exit 1)
        run: |
          printf -- '-----BEGIN RSA PRIVATE KEY-----\nMIIEow==\n-----END RSA PRIVATE KEY-----\n' >> "$CLAUDE_MEMORY_DIR/global.md"
          if bash hooks/scan-secrets.sh; then
            echo "FAIL: scanner did not detect PEM key"
            exit 1
          fi
          git -C "$CLAUDE_MEMORY_DIR" checkout -- global.md
      - name: bypass flag should allow even with secret
        env:
          CLAUDE_MEMORY_SKIP_SECRET_SCAN: "1"
        run: |
          echo 'leaked: sk-proj-abcdef1234567890abcdef1234567890' >> "$CLAUDE_MEMORY_DIR/global.md"
          bash hooks/scan-secrets.sh

  stage-md-smoke:
    name: stage-md smoke test (untracked subdir regression)
    runs-on: ubuntu-latest
    # Regression guard for the bug fixed in #1: `git add -- ':(glob)**.md'`
    # silently failed to stage `.md` files inside untracked directories,
    # so the very first `repos/<slug>.md` never got committed.
    env:
      CLAUDE_MEMORY_DIR: /home/runner/test-claude-memory
    steps:
      - uses: actions/checkout@v4
      - name: Set up test memory repo with initial commit
        run: |
          mkdir -p "$CLAUDE_MEMORY_DIR"
          cd "$CLAUDE_MEMORY_DIR"
          git init -q -b main
          git config user.email test@example.com
          git config user.name Tester
          echo 'safe content' > global.md
          git add global.md
          git commit -q -m "initial test fixture"
      - name: New .md inside untracked subdir is committed by stop hook
        run: |
          mkdir -p "$CLAUDE_MEMORY_DIR/repos"
          echo '# new project memory' > "$CLAUDE_MEMORY_DIR/repos/new.md"
          bash "$GITHUB_WORKSPACE/hooks/stop.sh"
          if ! git -C "$CLAUDE_MEMORY_DIR" log -1 --name-only --format= | grep -qx 'repos/new.md'; then
            echo "FAIL: repos/new.md was not committed by stop.sh"
            git -C "$CLAUDE_MEMORY_DIR" status
            git -C "$CLAUDE_MEMORY_DIR" log --oneline -5
            exit 1
          fi
      - name: Deletion of tracked .md is committed (documents -A behavior change)
        run: |
          rm "$CLAUDE_MEMORY_DIR/global.md"
          bash "$GITHUB_WORKSPACE/hooks/stop.sh"
          if git -C "$CLAUDE_MEMORY_DIR" cat-file -e HEAD:global.md 2>/dev/null; then
            echo "FAIL: deletion of global.md was not committed"
            git -C "$CLAUDE_MEMORY_DIR" log --oneline -5
            exit 1
          fi
      - name: Non-.md files stay unstaged (pathspec safety)
        run: |
          echo 'SECRET=should_not_be_committed' > "$CLAUDE_MEMORY_DIR/.env"
          echo '# another memory' > "$CLAUDE_MEMORY_DIR/repos/another.md"
          bash "$GITHUB_WORKSPACE/hooks/stop.sh"
          # .env must NOT appear in any commit
          if git -C "$CLAUDE_MEMORY_DIR" log --all --name-only --format= | grep -qx '.env'; then
            echo "FAIL: .env was committed — pathspec safety regressed"
            exit 1
          fi
          # but the new .md should be committed
          if ! git -C "$CLAUDE_MEMORY_DIR" log -1 --name-only --format= | grep -qx 'repos/another.md'; then
            echo "FAIL: repos/another.md was not committed"
            exit 1
          fi
